dimensions:
  count: 15
  items:
    - number: '01'
      name: review-entrypoints-and-integrations
      title: Review Entrypoints & Platform Integrations
      description: How agents connect to workflows — GitHub Apps, Actions, CLI, webhooks, and local execution.
      purpose: >-
        Understand how open-source code review agents connect to developer workflows, especially GitHub pull
        requests, GitLab merge requests, CI pipelines, webhooks, and local CLI execution.
    - number: '02'
      name: pr-diff-ingestion-and-normalisation
      title: PR Diff Ingestion & Normalisation
      description: Fetching, parsing, normalising, and representing pull request diffs.
      purpose: >-
        Understand how code review agents fetch, parse, normalise, and represent pull request diffs before
        passing them into review logic.
    - number: '03'
      name: context-selection-and-repository-understanding
      title: Context Selection & Repository Understanding
      description: Gathering repository context beyond the changed diff.
      purpose: >-
        Understand how review agents gather useful repository context beyond the changed diff, including
        related files, documentation, dependency graphs, tests, ownership rules, and architectural conventions.
    - number: '04'
      name: review-orchestration-and-agent-flow
      title: Review Orchestration & Agent Flow
      description: Multi-step workflows, specialised agents, tool calls, and verification passes.
      purpose: >-
        Understand how code review agents structure the review process across one-shot prompts, multi-step
        workflows, specialised agents, tool calls, and verification passes.
    - number: '05'
      name: prompt-and-policy-system
      title: Prompt & Policy System
      description: Defining, organising, customising, and applying prompts and review policies.
      purpose: >-
        Understand how code review agents define, organise, customise, and apply prompts, review instructions,
        coding standards, and project-specific policies.
    - number: '06'
      name: static-analysis-and-tool-integration
      title: Static Analysis & Tool Integration
      description: Integrating linters, type checkers, test runners, security scanners, and formatters.
      purpose: >-
        Understand how AI code review agents integrate deterministic tools such as linters, type checkers,
        test runners, security scanners, formatters, and static analysers.
    - number: '07'
      name: finding-generation-and-severity-model
      title: Finding Generation & Severity Model
      description: Representing, classifying, scoring, and prioritising findings.
      purpose: >-
        Understand how code review agents represent, classify, score, and prioritise findings.
    - number: '08'
      name: inline-comment-placement
      title: Inline Comment Placement
      description: Positioning inline comments inside pull request diffs.
      purpose: >-
        Understand how code review systems decide where to place inline comments and how they ensure
        comments are valid, precise, and useful inside pull request diffs.
    - number: '09'
      name: false-positive-control-and-verification
      title: False Positive Control & Verification
      description: Reducing hallucinations, speculative comments, duplicates, and low-value suggestions.
      purpose: >-
        Understand how code review agents reduce hallucinations, speculative comments, duplicate findings,
        and low-value suggestions.
    - number: '10'
      name: security-and-risk-review
      title: Security & Risk Review
      description: Detecting security, privacy, dependency, secret-management, and operational-risk issues.
      purpose: >-
        Understand how code review agents detect security, privacy, dependency, secret-management, and
        operational-risk issues.
    - number: '11'
      name: architecture-and-maintainability-review
      title: Architecture & Maintainability Review
      description: Identifying maintainability problems, architectural drift, and boundary violations.
      purpose: >-
        Understand how review agents identify maintainability problems, architectural drift, poor boundaries,
        excessive complexity, duplication, and code that does not fit existing project patterns.
    - number: '12'
      name: custom-rules-and-governance
      title: Custom Rules & Governance
      description: Defining custom rules, governance policies, and coding standards.
      purpose: >-
        Understand how code review agents allow teams to define custom rules, governance policies, coding
        standards, compliance requirements, and project-specific review contracts.
    - number: '13'
      name: user-experience-and-review-output
      title: User Experience & Review Output
      description: PR summaries, inline comments, check runs, and conversational interaction.
      purpose: >-
        Understand how code review agents communicate findings to developers through PR summaries, inline
        comments, check runs, markdown reports, status checks, and conversational commands.
    - number: '14'
      name: ci-cd-runtime-and-deployment-model
      title: CI/CD Runtime & Deployment Model
      description: Packaging, deploying, configuring, and executing review agents.
      purpose: >-
        Understand how code review agents are packaged, deployed, configured, and executed in real
        developer environments.
    - number: '15'
      name: observability-cost-and-evaluation
      title: Observability, Cost & Evaluation
      description: Measuring quality, tracking failures, monitoring cost, and evaluating accuracy.
      purpose: >-
        Understand how code review agents measure quality, track failures, monitor cost, evaluate review
        accuracy, and improve over time.