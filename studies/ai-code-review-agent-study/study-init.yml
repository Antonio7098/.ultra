name: ai-code-review-agent-study
description: >-
  Comparative study of open-source AI code review agent systems — examining entrypoints, diff ingestion, context
  selection, orchestration, prompts, static analysis integration, finding models, comment placement, false
  positive control, security review, architecture review, custom rules, UX, deployment, and observability across
  elite implementations. Designed to inform the design of Ultraplan's own review agent.
repos:
  count: 10
  items:
    - name: pr-agent
      url: https://github.com/The-PR-Agent/pr-agent
      description: >-
        Best-in-class open-source AI PR reviewer — supports PR review, suggestions, summary, and multi-platform
        workflows. The primary reference baseline for AI-assisted code review.
    - name: reviewdog
      url: https://github.com/reviewdog/reviewdog
      description: >-
        Deterministic review automation infrastructure — parses linter output and posts comments only on changed
        diff lines. Essential for understanding non-AI review automation patterns.
    - name: danger-js
      url: https://github.com/danger/danger
      description: >-
        Codifies repeated code review chores in CI — missing changelog updates, PR size checks, test reminders,
        and team conventions. Excellent for understanding rule-based review automation.
    - name: gerrit
      url: https://github.com/gerrit-review/gerrit
      description: >-
        Serious review-system architecture — patchsets, approvals, inline comments, verification, and submit
        flow. The reference design for mature review workflows beyond GitHub's model.
    - name: review-board
      url: https://github.com/reviewboard/reviewboard
      description: >-
        Mature open-source web-based code/document review system with ReviewBot for automated static-analysis
        review. Useful for understanding extensible review platforms.
    - name: patchwork
      url: https://github.com/getpatchwork/patchwork
      description: >-
        Email/patch-based review system for mailing-list workflows. Valuable for understanding patch tracking,
        state machines, and maintainer review patterns.
    - name: huggingface-ai-reviewer
      url: https://github.com/huggingface/ai-reviewer
      description: >-
        OpenAI-compatible LLM GitHub PR reviewer with inline comments and a human-validation mode before
        posting. Relevant for its validation-before-posting pattern.
    - name: canonical-maas-code-reviewer
      url: https://github.com/canonical/maas-code-reviewer
      description: >-
        Gemini-based diff reviewer maintained by Canonical's MAAS team. Useful for team-opinionated review
        rather than generic review patterns.
    - name: kasidit-ai-code-reviewer
      url: https://github.com/kasidit-wansudon/ai-code-reviewer
      description: >-
        Go GitHub Action that parses unified diff into per-file/per-hunk context, sends to LLM, and posts
        inline comments. Minimal but instructive implementation.
    - name: qwen-code-review
      url: https://github.com/QwenLM/qwen-code
      description: >-
        Design reference for local/PR review commands, inline comments, and rule injection from repo files.
        Reads rules from base branch to avoid malicious PR rule injection.
